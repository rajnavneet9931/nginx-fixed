version: "3.9"

services:
  app:
    build: .
    container_name: baresober-app
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads

  mongo:
    image: mongo:6
    container_name: baresober-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    container_name: baresober-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./client:/usr/share/nginx/html
      - ./nginx-baresober.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mongo_data:
