version: "3.9"

services:
  app:
    build: .
    container_name: baresober-app
    restart: always

    # 🔥 CRITICAL (fixes your JWT error)
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/baresober
      - JWT_SECRET=baresober_super_secret_key_123

    depends_on:
      - mongo

    volumes:
      - ./uploads:/app/uploads

  mongo:
    image: mongo:6
    container_name: baresober-mongo
    restart: always

    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    container_name: baresober-nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./client:/usr/share/nginx/html
      - ./nginx-baresober.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

volumes:
  mongo_data:
